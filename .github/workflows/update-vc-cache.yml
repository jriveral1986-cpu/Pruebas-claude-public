name: Actualizar valor cuota AFP

on:
  schedule:
    # Lunes a viernes a las 18:30 UTC (15:30 CLT / 14:30 CLST)
    # SP Chile actualiza los valores después del cierre de mercado
    - cron: '30 18 * * 1-5'
  workflow_dispatch: # permite ejecutar manualmente desde GitHub Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Obtener valores cuota desde SP Chile
        run: node scripts/update-vc-cache.js

      - name: Agregar día al histórico
        run: node scripts/backfill-vc-historico.js 1

      - name: Commit si hubo cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vc_cache.json data/vc_historico.json
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "chore: actualizar valor cuota AFP $(date -u +%Y-%m-%d)"
            git push
          fi
