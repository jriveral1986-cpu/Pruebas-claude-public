name: CI — Tests

on:
  push:
    branches: [main]
    paths:
      - 'js/**'
      - 'data/**'
      - 'test/**'
      - 'package.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar tests
        run: npm test
