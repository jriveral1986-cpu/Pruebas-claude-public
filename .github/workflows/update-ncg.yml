name: Actualizar Normativa NCG

on:
  schedule:
    # Cada lunes a las 08:00 UTC (05:00 CLT)
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar Chromium para Playwright
        run: npx playwright install chromium --with-deps

      - name: Extraer NCGs desde spensiones.cl
        run: node js/update.js

      - name: Ejecutar tests después del update
        run: npm test

      - name: Commit si hubo cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ncg.json data/ncg_meta.json pages/normativa.html
          if git diff --cached --quiet; then
            echo "Sin cambios en NCGs"
          else
            COUNT=$(git diff --cached --stat | grep 'ncg.json' | grep -o '[0-9]* insertion' | grep -o '[0-9]*' || echo '?')
            git commit -m "chore: actualizar normativa NCG — $(date -u +%Y-%m-%d)"
            git push
          fi
