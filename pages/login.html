<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a2e4a">
  <title>Iniciar Sesión — Previsión Chile</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root {
      --navy:   #1a2e4a;
      --blue:   #2563a8;
      --blue-lt:#e8f0fb;
      --gold:   #c8a84b;
      --gold-lt:#fdf6e3;
      --green:  #16a34a;
      --red:    #dc2626;
      --red-lt: #fee2e2;
      --muted:  #6b7280;
      --border: #d1d5db;
      --bg:     #f7f6f2;
      --white:  #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── Card ── */
    .login-card {
      background: var(--white);
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    /* ── Card header ── */
    .card-header {
      background: var(--navy);
      padding: 28px 32px 24px;
      text-align: center;
    }
    .card-header .logo {
      font-size: 22px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
    }
    .card-header .logo span { color: var(--gold); }
    .card-header .tagline {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 14px 8px;
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 150ms ease-in-out, border-color 150ms ease-in-out;
      min-height: 44px;
    }
    .tab-btn.active {
      color: var(--navy);
      border-bottom-color: var(--gold);
    }

    /* ── Form body ── */
    .card-body { padding: 28px 32px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--navy);
      background: white;
      transition: border-color 150ms ease-in-out;
      min-height: 44px;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,168,.12);
    }
    .form-group input.error { border-color: var(--red); }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 12px;
      color: var(--blue);
      text-decoration: none;
      margin-top: -10px;
      margin-bottom: 18px;
    }
    .forgot-link:hover { text-decoration: underline; }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms ease-in-out;
      min-height: 44px;
    }
    .btn-submit:hover { background: #243d5f; }
    .btn-submit:disabled { background: var(--muted); cursor: not-allowed; }

    /* ── Separator ── */
    .separator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .separator::before,
    .separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Google button ── */
    .btn-google {
      width: 100%;
      padding: 11px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 150ms ease-in-out, border-color 150ms ease-in-out;
      min-height: 44px;
    }
    .btn-google:hover { background: #f9fafb; border-color: #9ca3af; }

    /* ── Error / success messages ── */
    .msg {
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .msg.show { display: block; }
    .msg--error   { background: var(--red-lt); color: #991b1b; border: 1px solid #fca5a5; }
    .msg--success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }

    /* ── Admin badge ── */
    .admin-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--gold-lt);
      border: 1px solid var(--gold);
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 12px;
      color: #78350f;
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* ── Footer ── */
    .login-footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 20px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="card-header">
    <div class="logo">Previsión<span>Chile</span></div>
    <div class="tagline">Calculadora de Pensión AFP</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-login-btn">Iniciar sesión</button>
  </div>

  <div class="card-body">

    <!-- Admin badge (visible solo en modo admin) -->
    <div class="admin-badge" id="admin-badge" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Acceso Administrador — solo usuario y contraseña
    </div>

    <!-- ── TAB: Iniciar sesión ── -->
    <div class="tab-panel active" id="panel-login">
      <div class="msg msg--error" id="err-login"></div>
      <div class="msg msg--success" id="ok-login"></div>

      <div class="form-group">
        <label for="login-email" id="label-login-email">Correo electrónico</label>
        <input type="email" id="login-email" autocomplete="email" placeholder="tu@correo.com">
      </div>
      <div class="form-group">
        <label for="login-pass">Contraseña</label>
        <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••">
      </div>

      <a href="#" class="forgot-link" id="link-forgot">¿Olvidaste tu contraseña?</a>

      <button class="btn-submit" id="btn-login">Iniciar sesión</button>

      <div id="google-section">
        <div class="separator">o continúa con</div>
        <button class="btn-google" id="btn-google">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continuar con Google
        </button>
      </div>
    </div>


  </div><!-- /.card-body -->
</div><!-- /.login-card -->

<div class="login-footer">
  Al iniciar sesión aceptas que tus datos se usan solo para calcular tu pensión estimada.<br>
  <a href="../index.html" style="color:var(--blue)">Conoce más sobre Previsión Chile</a>
</div>

<script type="module">
  import {
    iniciarSesionEmail,
    iniciarSesionGoogle,
    recuperarPassword,
    mensajeError,
  } from '../js/auth.js';

  // ── Detectar modo admin ────────────────────────────────────────────────────
  const params    = new URLSearchParams(location.search);
  const nextUrl   = params.get('next') || '../index.html';
  const modoAdmin = params.has('admin');

  // Credenciales internas de Firebase para la cuenta de administrador del sistema
  // (el usuario escribe "administrador"/"admin" — Firebase usa estas credenciales reales)
  const ADMIN_INTERNAL_EMAIL = 'admin@previsionchile.local';
  const ADMIN_INTERNAL_PASS  = 'Admin.2026!';

  if (modoAdmin) {
    document.getElementById('admin-badge').style.display = 'flex';
    document.getElementById('google-section').style.display = 'none';
    // Cambiar campo email a campo usuario genérico
    const loginEmailInput = document.getElementById('login-email');
    const loginEmailLabel = document.getElementById('label-login-email');
    loginEmailInput.type        = 'text';
    loginEmailInput.placeholder = 'administrador';
    loginEmailInput.autocomplete = 'username';
    loginEmailLabel.textContent = 'Usuario';
  }

  // ── Mostrar / ocultar error ────────────────────────────────────────────────
  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
    el.className = el.className.replace('msg--success', 'msg--error') + ' show';
  }
  function showSuccess(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'msg msg--success show';
  }
  function clearMsg(id) {
    const el = document.getElementById(id);
    el.textContent = '';
    el.classList.remove('show');
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Cargando…' : btn.dataset.label;
  }

  // Guardar label original
  const btnLogin = document.getElementById('btn-login');
  btnLogin.dataset.label = btnLogin.textContent;

  // ── Redirección post-login ─────────────────────────────────────────────────
  function redirigir() {
    location.href = decodeURIComponent(nextUrl);
  }

  // ── Login email/contraseña ─────────────────────────────────────────────────
  document.getElementById('btn-login').addEventListener('click', async () => {
    clearMsg('err-login');
    const inputVal = document.getElementById('login-email').value.trim();
    const pass     = document.getElementById('login-pass').value;

    if (!inputVal || !pass) {
      showError('err-login', modoAdmin ? 'Ingresa usuario y contraseña.' : 'Ingresa correo y contraseña.');
      return;
    }

    // En modo admin: mapear "administrador"/"admin" → credenciales internas de Firebase
    let email = inputVal;
    let passFirebase = pass;
    if (modoAdmin) {
      if (inputVal !== 'administrador' || pass !== 'admin') {
        showError('err-login', 'Usuario o contraseña incorrectos.');
        return;
      }
      email        = ADMIN_INTERNAL_EMAIL;
      passFirebase = ADMIN_INTERNAL_PASS;
    }

    setLoading('btn-login', true);
    try {
      await iniciarSesionEmail(email, passFirebase);
      redirigir();
    } catch (e) {
      showError('err-login', mensajeError(e.code));
      setLoading('btn-login', false);
    }
  });

  // Enviar con Enter
  ['login-email', 'login-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });
  });

  // ── Login Google ───────────────────────────────────────────────────────────
  document.getElementById('btn-google').addEventListener('click', async () => {
    clearMsg('err-login');
    try {
      await iniciarSesionGoogle();
      redirigir();
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') {
        showError('err-login', mensajeError(e.code));
      }
    }
  });

  // ── Recuperar contraseña ───────────────────────────────────────────────────
  document.getElementById('link-forgot').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    if (!email) {
      showError('err-login', 'Ingresa tu correo primero, luego haz clic aquí.');
      return;
    }
    try {
      await recuperarPassword(email);
      showSuccess('ok-login', `Enviamos un enlace de recuperación a ${email}. Revisa tu bandeja.`);
    } catch (err) {
      showError('err-login', mensajeError(err.code));
    }
  });

</script>
</body>
</html>
